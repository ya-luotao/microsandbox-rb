name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Native compile + unit specs finish in well under 10 min; the cap just keeps
    # a wedged build from sitting until GitHub's 6-hour default.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4

      # The core crate is statically linked into the extension and pulls in
      # libcap-ng on Linux (via the caps/capng crates), plus the toolchain that
      # builds libkrunfw from source whenever the prebuilt download is
      # unavailable. The ubuntu runners don't ship libcap-ng-dev, so the final
      # link fails with `cannot find -lcap-ng` without this. macOS uses a
      # different code path and needs none of it. Mirrors the upstream core
      # crate's documented Linux build dependencies.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev gcc make flex bison libelf-dev bc python3-pyelftools

      # The core crate is a pinned git dependency, so the build is self-contained
      # (no adjacent checkout needed). Rust is required to compile the extension.
      # The repo's rust-toolchain.toml pins `stable`; this keeps the action's
      # installed toolchain in sync (the input is `rustup-toolchain`, not
      # `rust-toolchain` — the latter is silently ignored).
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          rustup-toolchain: stable
          bundler-cache: true
          cargo-cache: true

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Run unit specs
        run: bundle exec rake spec

  # Real-microVM integration tests — the round-trip verification that the unit
  # suite (which stubs the native layer) cannot provide. Boots actual sandboxes
  # from an OCI image and exercises exec/shell/fs/metrics/logs end-to-end.
  #
  # Requires KVM. GitHub-hosted Linux runners expose /dev/kvm (nested virt); the
  # udev step below grants the runner user access to it. The official repo runs
  # the equivalent suites on self-hosted KVM runners — if GitHub-hosted KVM
  # proves insufficient for the heavy core runtime on the first run, point this
  # job at a self-hosted runner (set `runs-on`) exactly as upstream does.
  #
  # Runs on pushes to main and manual dispatch (not on every PR) so external
  # contributors aren't gated on KVM availability.
  integration:
    name: integration (real microVM, KVM)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # A full run (compile + boot real microVMs + specs) lands around 10-12 min.
    # This cap is the safety net: a single deadlocked spec (e.g. a guest process
    # blocked on stdin that never gets EOF) would otherwise wedge the job until
    # GitHub's 6-hour default and surface the whole run as "cancelled".
    #
    # Raised from 20 to 25 to absorb the agent-relay retry (spec/spec_helper.rb):
    # a deterministically stuck boot can now retry up to 3×180s + waits before
    # failing, which on top of the ~11-12 min suite could otherwise clip the old
    # 20-min cap and surface a clean failure as a confusing job timeout.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev gcc make flex bison libelf-dev bc python3-pyelftools

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          rustup-toolchain: stable
          bundler-cache: true
          cargo-cache: true

      - name: Compile native extension
        run: bundle exec rake compile

      # The core's `prebuilt` build.rs provisions msb + libkrunfw at compile
      # time; install explicitly too so a missing runtime fails loudly here
      # rather than silently skipping the integration specs.
      - name: Ensure runtime installed
        run: bundle exec ruby -e 'require "microsandbox"; Microsandbox.install unless Microsandbox.installed?; abort("runtime not installed") unless Microsandbox.installed?'

      # Pull from AWS's public ECR mirror of the Docker library rather than
      # docker.io: anonymous docker.io pulls are rate-limited and fail in CI
      # with "Not authorized". The ECR mirror needs no auth and isn't throttled.
      - name: Run integration specs (boots real microVMs)
        env:
          MICROSANDBOX_INTEGRATION: "1"
          MICROSANDBOX_TEST_IMAGE: public.ecr.aws/docker/library/alpine:latest
        run: bundle exec rspec spec/integration

  lint:
    name: lint (rustfmt + clippy + standardrb)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          rustup-toolchain: stable
          bundler-cache: true
          cargo-cache: true
      - name: rustfmt
        run: cargo fmt --check --manifest-path ext/microsandbox/Cargo.toml
      - name: clippy
        run: cargo clippy --manifest-path ext/microsandbox/Cargo.toml -- -D warnings
      # Ruby lint/format for the lib/ + spec/ layer (StandardRB, zero-config).
      - name: standardrb
        run: bundle exec standardrb
