name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: microsandbox-rb

      # The native extension depends on the core crate via a path dependency
      # (`../../../microsandbox/crates/microsandbox`), so the runtime repo must
      # be checked out as a sibling directory.
      - name: Checkout microsandbox runtime (sibling)
        uses: actions/checkout@v4
        with:
          repository: superradcompany/microsandbox
          path: microsandbox
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          working-directory: microsandbox-rb
          bundler-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: microsandbox-rb/ext/microsandbox -> ../../target

      - name: Compile native extension
        working-directory: microsandbox-rb
        run: bundle exec rake compile

      - name: Run unit specs
        working-directory: microsandbox-rb
        run: bundle exec rake spec

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: microsandbox-rb
      - uses: actions/checkout@v4
        with:
          repository: superradcompany/microsandbox
          path: microsandbox
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        working-directory: microsandbox-rb/ext/microsandbox
        run: cargo fmt --check
      - name: clippy
        working-directory: microsandbox-rb/ext/microsandbox
        run: cargo clippy -- -D warnings
